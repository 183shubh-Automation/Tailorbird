name: Playwright Tests

on:
  push:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      # Run mandatory tests first in serial
      - name: Run @mandatory tests
        run: npx playwright test --grep "@mandatory" --workers=1

      # Run all remaining tests except mandatory
      - name: Run remaining tests
        run: npx playwright test tests/TC10_approval.spec.js tests/TC17_OOO_OutOfOffice.spec.js tests/TC13_FInalizeBidWithUIFlow.spec.js --grep-invert "@mandatory" --workers=4

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

